<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Reminder</title>

  <!-- FOUT prevention: apply dark theme before first paint -->
  <script>
    (function() {
      var t = localStorage.getItem('ndt_theme');
      if (t === 'dark') document.documentElement.dataset.theme = 'dark';
    })();
  </script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

 

  <header>
    <button
      id="theme-toggle"
      aria-pressed="false"
      aria-label="Toggle dark mode"
    >
      Toggle Theme
    </button>
  </header>

  <main>

    <!-- Greeting Widget -->
    <section id="greeting-widget" aria-label="Greeting">
      <div id="clock" aria-live="polite"></div>
      <div id="date"></div>
      <div id="greeting" aria-live="polite"></div>

      <div class="name-form">
        <label for="name-input">Your name</label>
        <input
          type="text"
          id="name-input"
          placeholder="Enter your name"
          autocomplete="name"
        >
        <button id="name-save" type="button">Save Name</button>
        <span id="name-error" role="alert"></span>
      </div>
    </section>

    <!-- Timer Widget -->
    <section id="timer-widget" aria-label="Pomodoro Timer">
      <div id="timer-display" aria-live="polite">25:00</div>

      <div class="timer-controls">
        <button id="start-btn" type="button" aria-label="Start timer">Start</button>
        <button id="stop-btn" type="button" aria-label="Stop timer" disabled>Stop</button>
        <button id="reset-btn" type="button" aria-label="Reset timer">Reset</button>
      </div>

      <div class="duration-form">
        <label for="duration-input">Duration (minutes)</label>
        <input
          type="number"
          id="duration-input"
          min="1"
          max="120"
          placeholder="1–120"
        >
        <button id="duration-save" type="button">Save Duration</button>
        <span id="duration-error" role="alert"></span>
      </div>

      <div id="timer-alert" role="alert" hidden>
        Time is up! Your session has ended.
      </div>
    </section>

    <!-- Task Widget -->
    <section id="task-widget" aria-label="Task Manager">
      <div class="task-form">
        <label for="task-input">New task</label>
        <input
          type="text"
          id="task-input"
          placeholder="Enter a task"
          autocomplete="off"
        >
        <button id="task-submit" type="button">Add Task</button>
        <span id="task-error" role="alert"></span>
      </div>

      <div class="task-sort">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="default">Default (by creation time)</option>
          <option value="az">Alphabetical (A–Z)</option>
          <option value="za">Alphabetical (Z–A)</option>
          <option value="completed_last">Completed last</option>
        </select>
      </div>

      <ul id="task-list" aria-label="Task list"></ul>
    </section>

    <!-- Link Widget -->
    <section id="link-widget" aria-label="Quick Links">
      <div class="link-form">
        <label for="link-label-input">Link label</label>
        <input
          type="text"
          id="link-label-input"
          placeholder="e.g. GitHub"
          autocomplete="off"
        >
        <span id="link-label-error" role="alert"></span>

        <label for="link-url-input">URL</label>
        <input
          type="url"
          id="link-url-input"
          placeholder="https://example.com"
          autocomplete="url"
        >
        <span id="link-url-error" role="alert"></span>

        <button id="link-submit" type="button">Add Link</button>
      </div>

      <div id="link-list" aria-label="Quick links list"></div>
    </section>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
